<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cairn Activity</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 24px; max-width: 760px; margin-inline: auto; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { opacity: .6; margin: 0 0 20px; }
  .sub a { color: inherit; }
  .now { display: flex; align-items: center; gap: 10px; border: 1px solid color-mix(in srgb, var(--c-cyan) 50%, transparent); background: color-mix(in srgb, var(--c-cyan) 10%, transparent); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; }
  .now .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--c-cyan); animation: pulse 1.2s ease-in-out infinite; flex: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .card { border: 1px solid color-mix(in srgb, currentColor 16%, transparent); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .card.skip { opacity: .55; }
  .top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .time { font-variant-numeric: tabular-nums; opacity: .5; font-size: 12px; min-width: 92px; }
  .label { font-weight: 650; }
  .tag { font-size: 11px; padding: 1px 7px; border-radius: 20px; border: 1px solid color-mix(in srgb, currentColor 22%, transparent); opacity: .8; }
  .tag.new { color: var(--c-green); border-color: color-mix(in srgb, var(--c-green) 45%, transparent); }
  .score { display: flex; align-items: center; gap: 7px; margin-left: auto; }
  .score b { font-variant-numeric: tabular-nums; }
  .bar { width: 56px; height: 6px; border-radius: 4px; background: color-mix(in srgb, currentColor 14%, transparent); overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 4px; }
  .req { opacity: .85; margin: 8px 0 0; }
  .out { margin: 7px 0 0; white-space: pre-wrap; word-break: break-word; background: color-mix(in srgb, currentColor 6%, transparent); padding: 8px 10px; border-radius: 8px; font: 12.5px/1.5 ui-monospace, monospace; }
  .improve { margin: 7px 0 0; font-size: 13px; }
  .improve b { color: var(--c-cyan); font-weight: 600; }
  details { margin-top: 6px; }
  summary { cursor: pointer; opacity: .6; font-size: 12px; }
  .reason { font-size: 13px; margin: 6px 0 0; }
  .reason div { padding: 1px 0; }
  .lo { color: var(--c-red); } .mid { color: var(--c-amber); } .hi { color: var(--c-green); }
  .empty { opacity: .6; }
  :root { --c-cyan:#2a9fd6; --c-green:#2e9b57; --c-amber:#c98a16; --c-red:#cc4444; }
  @media (prefers-color-scheme: dark) { :root { --c-cyan:#5cc4ef; --c-green:#52c47e; --c-amber:#e0a93a; --c-red:#e06b6b; } }
</style>
</head>
<body>
<h1>Cairn Activity</h1>
<p class="sub">What the background learner is doing, newest first. Auto-refreshes. <a href="/skills">skills &rarr;</a> &middot; <a href="/">brain &rarr;</a></p>
<div id="now"></div>
<div id="list"></div>
<script>
const esc = (s) => (s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const fmtTs = (t) => t > 1e10 ? new Date(t).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "#" + t;
const tier = (s) => s >= 0.7 ? "hi" : s >= 0.5 ? "mid" : "lo";
const tierColor = (s) => s >= 0.7 ? "var(--c-green)" : s >= 0.5 ? "var(--c-amber)" : "var(--c-red)";
const clip = (s, n = 100) => { s = (s ?? "").replace(/\s+/g, " ").trim(); return s.length > n ? s.slice(0, n - 1) + "…" : s; };

function card(e) {
  if (e.phase === "failed")
    return `<div class="card skip"><div class="top"><span class="time">${fmtTs(e.ts)}</span><span class="lo">learner call failed${e.error ? ": " + esc(clip(e.error, 120)) : ""}</span></div>${e.request ? `<p class="req">${esc(clip(e.request))}</p>` : ""}</div>`;
  if (e.phase === "skipped")
    return `<div class="card skip"><div class="top"><span class="time">${fmtTs(e.ts)}</span><span>not a reusable task</span></div>${e.request ? `<p class="req">${esc(clip(e.request))}</p>` : ""}</div>`;
  const s = e.score ?? 0, pct = Math.round(Math.max(0, Math.min(1, s)) * 100);
  const tags = [e.created ? `<span class="tag new">new skill</span>` : `<span class="tag">updated</span>`, e.master ? `<span class="tag">master rewritten</span>` : ""].join("");
  const r = e.review || {};
  const reason = (r.right || r.wrong) ? `<details><summary>reasoning</summary><div class="reason">
      ${r.right ? `<div>✓ ${esc(r.right)}</div>` : ""}
      ${r.wrong ? `<div>✗ ${esc(r.wrong)}</div>` : ""}</div></details>` : "";
  return `<div class="card">
    <div class="top">
      <span class="time">${fmtTs(e.ts)}</span>
      <span class="label">${esc(e.label || "?")}</span>
      ${tags}
      <span class="score"><b class="${tier(s)}">${s.toFixed(2)}</b><span class="bar"><i style="width:${pct}%;background:${tierColor(s)}"></i></span></span>
    </div>
    ${e.request ? `<p class="req">${esc(clip(e.request))}</p>` : ""}
    ${e.output ? `<div class="out">${esc(e.output)}</div>` : ""}
    ${r.improve ? `<p class="improve"><b>next:</b> ${esc(r.improve)}</p>` : ""}
    ${reason}
  </div>`;
}

let lastJson = "";
async function load() {
  let data;
  try { data = await (await fetch("/api/activity")).json(); } catch { return; }
  const acts = data.activity || [];
  const json = JSON.stringify(acts);
  if (json === lastJson) return; // skip rebuild so an open "reasoning" panel doesn't snap shut
  lastJson = json;

  const nowEl = document.getElementById("now");
  const processing = acts[0] && acts[0].phase === "start" ? acts[0] : null;
  nowEl.innerHTML = processing
    ? `<div class="now"><span class="dot"></span><span>Reviewing your last turn… <span style="opacity:.7">${esc(clip(processing.request, 80))}</span></span></div>`
    : "";

  const done = acts.filter((e) => e.phase !== "start");
  const list = document.getElementById("list");
  list.innerHTML = done.length ? done.map(card).join("") : '<p class="empty">Nothing learned yet. Finish a task and it shows up here.</p>';
}
load();
setInterval(load, 2000);
</script>
</body>
</html>
