<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cairn</title>
  <style>
    :root { --line:#e2e8f0; --muted:#64748b; --ink:#0f172a; --bg:#f8fafc; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--ink);
      font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
    header { position:fixed; top:0; left:0; right:0; height:52px; z-index:30; display:flex; align-items:center;
      gap:12px; padding:0 18px; background:#fff; border-bottom:1px solid var(--line); }
    .logo { width:26px; height:26px; border-radius:7px; display:grid; place-items:center; font-size:14px;
      text-decoration:none; background:linear-gradient(135deg,#3b82f6,#8b5cf6); }
    .brand { font-weight:700; }
    .crumb { color:var(--muted); font-size:12px; max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .crumb a { color:var(--muted); text-decoration:none; }
    .grow { flex:1; }
    #q { width:300px; background:var(--bg); border:1px solid var(--line); border-radius:7px; padding:6px 11px; font-size:12px; outline:none; }
    .toggle { display:flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
    .toggle button { border:none; background:#fff; color:var(--muted); font-size:12px; padding:5px 12px; cursor:pointer; }
    .toggle button.on { background:#3b82f6; color:#fff; }
    main { position:fixed; inset:52px 0 0 0; overflow:auto; }
    .wrap { max-width:760px; margin:0 auto; padding:22px 20px; }
    .meta { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#94a3b8; font-weight:600; margin:0 0 12px; }
    .card { display:flex; gap:12px; align-items:flex-start; width:100%; text-align:left; background:#fff;
      border:1px solid var(--line); border-left:4px solid var(--accent,#94a3b8); border-radius:10px;
      padding:13px 16px; margin-bottom:10px; cursor:pointer; text-decoration:none; color:inherit; font:inherit; }
    .card:hover { border-color:#bfdbfe; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--accent,#94a3b8); margin-top:5px; flex-shrink:0; }
    .q { font-size:14px; font-weight:500; }
    .a { display:block; font-size:12px; color:#334155; margin-top:4px; }
    .count { font-size:11px; color:var(--muted); margin-left:auto; flex-shrink:0; }
    #canvas { position:absolute; inset:0; overflow:hidden; cursor:grab; }
    #canvas.drag { cursor:grabbing; }
    #stage { position:absolute; left:0; top:0; transform-origin:0 0; }
    .node { position:absolute; width:230px; background:#fff; border:1px solid var(--line);
      border-left:4px solid var(--accent,#94a3b8); border-radius:9px; padding:8px 12px; cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.06); font-size:12px; line-height:1.4; }
    .node.focus { box-shadow:0 0 0 2px #3b82f655, 0 8px 24px rgba(0,0,0,.13); }
    .node .badge { display:block; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--bt,#64748b); margin-bottom:3px; }
    svg#edges { position:absolute; left:0; top:0; overflow:visible; }
    #detail { position:fixed; top:52px; right:0; bottom:0; width:380px; z-index:40; background:#fff;
      border-left:1px solid var(--line); box-shadow:-4px 0 24px rgba(0,0,0,.08); padding:20px 22px; overflow:auto; }
    #detail .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#94a3b8; font-weight:600; margin:16px 0 5px; }
    #detail .ans { white-space:pre-wrap; font-size:13px; color:#334155; }
    .chip { display:inline-block; font-size:11px; padding:3px 9px; margin:3px 4px 0 0; cursor:pointer;
      border:1px solid var(--line); border-radius:100px; background:var(--bg); color:#475569; }
    .x { position:absolute; top:14px; right:14px; width:26px; height:26px; border:none; border-radius:6px;
      background:#f1f5f9; color:#64748b; font-size:15px; cursor:pointer; }
    .empty { color:#cbd5e1; text-align:center; padding:60px 0; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/" id="home">🧠</a>
    <span class="brand">cairn</span>
    <span class="crumb" id="crumb"></span>
    <span class="grow"></span>
    <input id="q" placeholder="Search neurons…" autocomplete="off" />
    <div class="toggle" id="toggle" hidden>
      <button data-mode="graph" class="on">Graph</button>
      <button data-mode="list">List</button>
    </div>
  </header>
  <main><div id="app"></div></main>
  <aside id="detail" hidden></aside>
  <script type="module" src="/app.js"></script>
</body>
</html>
