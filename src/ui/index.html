<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cairn</title>
  <style>
    :root {
      --bg:#fafaf9; --surface:#fff; --ink:#1c1917; --muted:#78716c; --line:#e7e5e4;
      --accent:#4f46e5; --accent-soft:#eef2ff; --ans:#059669; --uns:#a8a29e;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--ink);
      font:14px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased; }
    header { position:fixed; top:0; left:0; right:0; height:56px; z-index:30; display:flex; align-items:center;
      gap:14px; padding:0 20px; background:rgba(255,255,255,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
    .logo { display:flex; align-items:center; gap:9px; text-decoration:none; color:inherit; }
    .brand { font-weight:650; letter-spacing:-.01em; font-size:15px; }
    .crumb { color:var(--muted); font-size:12.5px; max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .crumb a { color:var(--muted); text-decoration:none; } .crumb a:hover { color:var(--ink); }
    .grow { flex:1; }
    #q { width:300px; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:7px 12px;
      font-size:13px; color:var(--ink); outline:none; transition:border-color .15s,box-shadow .15s; }
    #q:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); background:#fff; }
    .toggle { display:flex; gap:2px; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:2px; }
    .toggle button { border:none; background:transparent; color:var(--muted); font:inherit; font-size:12.5px;
      padding:4px 12px; border-radius:7px; cursor:pointer; }
    .toggle button.on { background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.06); }
    main { position:fixed; inset:56px 0 0 0; overflow:auto; }
    .wrap { max-width:720px; margin:0 auto; padding:30px 24px 60px; }
    .meta { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:600; margin:0 0 16px; }
    .card { display:flex; gap:13px; align-items:flex-start; width:100%; text-align:left; background:var(--surface);
      border:1px solid var(--line); border-radius:13px; padding:15px 18px; margin-bottom:11px; cursor:pointer;
      text-decoration:none; color:inherit; font:inherit; transition:border-color .15s,box-shadow .15s,transform .1s; }
    .card:hover { border-color:#d6d3d1; box-shadow:0 4px 16px rgba(28,25,23,.06); transform:translateY(-1px); }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--accent,#a8a29e); margin-top:6px; flex-shrink:0; }
    .q { font-size:14px; font-weight:500; color:var(--ink); }
    .a { display:block; font-size:13px; color:var(--muted); margin-top:5px; line-height:1.5; }
    .count { font-size:11.5px; color:var(--muted); margin-left:auto; flex-shrink:0; white-space:nowrap; }
    #canvas { position:absolute; inset:0; overflow:hidden; cursor:grab;
      background-image:radial-gradient(var(--line) 1px,transparent 1px); background-size:22px 22px; }
    #canvas.drag { cursor:grabbing; }
    #stage { position:absolute; left:0; top:0; transform-origin:0 0; }
    .node { position:absolute; width:230px; height:84px; overflow:hidden; background:var(--surface);
      border:1px solid var(--line); border-radius:12px; padding:11px 14px; cursor:pointer;
      box-shadow:0 2px 10px rgba(28,25,23,.05); font-size:12.5px; line-height:1.45;
      transition:box-shadow .15s,border-color .15s; }
    .node .text { display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; line-clamp:2; overflow:hidden; }
    .node:hover { border-color:#d6d3d1; box-shadow:0 6px 18px rgba(28,25,23,.09); }
    .node.focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft),0 8px 22px rgba(28,25,23,.12); }
    .node .badge { display:inline-flex; align-items:center; gap:5px; font-size:9.5px; font-weight:600;
      text-transform:uppercase; letter-spacing:.05em; color:var(--bt,#78716c); margin-bottom:6px; }
    .node .badge::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
    svg#edges { position:absolute; left:0; top:0; overflow:visible; }
    #detail { position:fixed; top:56px; right:0; bottom:0; width:392px; z-index:40; background:var(--surface);
      border-left:1px solid var(--line); box-shadow:-8px 0 28px rgba(28,25,23,.07); padding:24px 26px; overflow:auto; }
    #detail .lbl { font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:600; margin:18px 0 6px; }
    #detail .q { font-size:15px; line-height:1.45; }
    #detail .ans { white-space:pre-wrap; font-size:13.5px; color:#44403c; line-height:1.6; }
    .chip { display:inline-block; font-size:12px; padding:4px 11px; margin:4px 5px 0 0; cursor:pointer;
      border:1px solid var(--line); border-radius:100px; background:var(--bg); color:#57534e; transition:border-color .12s; }
    .chip:hover { border-color:var(--accent); color:var(--accent); }
    .x { position:absolute; top:16px; right:16px; width:28px; height:28px; border:none; border-radius:8px;
      background:var(--bg); color:var(--muted); font-size:16px; cursor:pointer; }
    .x:hover { background:#f5f5f4; color:var(--ink); }
    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
      height:70vh; color:var(--muted); text-align:center; }
    .empty h2 { margin:14px 0 0; font-size:16px; font-weight:600; color:var(--ink); }
    .empty p { margin:0; font-size:13.5px; max-width:340px; }
    .newbtn { border:1px solid var(--accent); background:var(--accent); color:#fff; border-radius:9px;
      padding:7px 14px; font:inherit; font-size:13px; font-weight:500; cursor:pointer; }
    .newbtn:hover { filter:brightness(1.06); }
    .field { width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 11px; margin:0;
      font:inherit; font-size:13px; color:var(--ink); background:#fff; outline:none; resize:vertical; }
    .field:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .row { display:flex; gap:8px; margin-top:14px; }
    .btn { border:1px solid var(--line); border-radius:9px; padding:8px 16px; font:inherit; font-size:13px;
      font-weight:500; cursor:pointer; background:#fff; color:var(--ink); }
    .btn.primary { flex:1; background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.danger { color:#b91c1c; border-color:#fecaca; background:#fef2f2; }
    .err { margin-top:10px; font-size:12.5px; color:#b91c1c; background:#fef2f2; border:1px solid #fecaca;
      border-radius:8px; padding:8px 11px; }
    .chip b { margin-left:7px; color:#a8a29e; cursor:pointer; font-weight:400; }
    .chip b:hover { color:#b91c1c; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/" id="home" title="Cairn">
      <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
        <ellipse cx="12" cy="19" rx="8" ry="2.5" fill="#1c1917" />
        <ellipse cx="12" cy="13.6" rx="6.2" ry="2.3" fill="#44403c" />
        <ellipse cx="12" cy="8.6" rx="4.5" ry="2.1" fill="#78716c" />
        <ellipse cx="12" cy="4.4" rx="2.7" ry="1.7" fill="#a8a29e" />
      </svg>
      <span class="brand">Cairn</span>
    </a>
    <span class="crumb" id="crumb"></span>
    <span class="grow"></span>
    <input id="q" placeholder="Search thoughts" autocomplete="off" />
    <div class="toggle" id="toggle" hidden>
      <button data-mode="graph" class="on">Graph</button>
      <button data-mode="list">List</button>
    </div>
    <button id="new" class="newbtn">+ New</button>
  </header>
  <main><div id="app"></div></main>
  <aside id="detail" hidden></aside>
  <script type="module" src="/app.js"></script>
</body>
</html>
