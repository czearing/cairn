<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cairn</title>
  <style>
    :root {
      /* color */
      --bg:#fafaf9; --surface:#fff; --ink:#1c1917; --ink2:#44403c; --muted:#78716c; --faint:#a8a29e;
      --line:#e7e5e4; --hover:#f5f5f4; --accent:#4f46e5; --accent-soft:#eef2ff; --ans:#059669; --uns:#a8a29e;
      --danger:#b91c1c; --danger-soft:#fef2f2; --danger-line:#fecaca;
      /* space (4px grid) */ --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px;
      /* radius */ --r1:6px; --r2:10px; --r3:14px; --rp:999px;
      /* type */ --fz-xs:11px; --fz-sm:12.5px; --fz-md:14px; --fz-lg:15px; --fz-xl:20px;
      --ctl:34px; --shadow:0 4px 16px rgba(28,25,23,.06);
    }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--ink);
      font:var(--fz-md)/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased; }
    header { position:fixed; top:0; left:0; right:0; height:56px; z-index:30; display:flex; align-items:center;
      gap:var(--s3); padding:0 var(--s5); background:rgba(255,255,255,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
    .logo { display:flex; align-items:center; gap:9px; text-decoration:none; color:inherit; }
    .brand { font-weight:650; letter-spacing:-.01em; font-size:var(--fz-lg); }
    .crumb { color:var(--muted); font-size:var(--fz-sm); max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .crumb a { color:var(--muted); text-decoration:none; } .crumb a:hover { color:var(--ink); }
    .grow { flex:1; }
    #q { width:280px; height:var(--ctl); background:var(--bg); border:1px solid var(--line); border-radius:var(--r2);
      padding:0 var(--s3); font:inherit; font-size:var(--fz-sm); color:var(--ink); outline:none; transition:border-color .15s,box-shadow .15s; }
    #q:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); background:#fff; }
    .toggle { display:flex; align-items:center; height:var(--ctl); gap:2px; background:var(--bg); border:1px solid var(--line); border-radius:var(--r2); padding:0 3px; }
    .toggle button { border:none; background:transparent; color:var(--muted); font:inherit; font-size:var(--fz-sm);
      height:26px; padding:0 var(--s3); border-radius:var(--r1); cursor:pointer; }
    .toggle button.on { background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.06); }
    .newbtn { display:inline-flex; align-items:center; gap:6px; height:var(--ctl); padding:0 var(--s3);
      border:1px solid var(--accent); background:var(--accent); color:#fff; border-radius:var(--r2);
      font:inherit; font-size:var(--fz-sm); font-weight:550; cursor:pointer; transition:filter .15s,transform .05s; }
    .newbtn:hover { filter:brightness(1.07); } .newbtn:active { transform:translateY(.5px); }
    .newbtn svg { width:14px; height:14px; }
    main { position:fixed; inset:56px 0 0 0; overflow:auto; }
    .wrap { max-width:720px; margin:0 auto; padding:var(--s6) var(--s5) 60px; }
    .meta { font-size:var(--fz-xs); text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:600; margin:0 0 var(--s4); }
    .card { display:flex; gap:var(--s3); align-items:flex-start; width:100%; text-align:left; background:var(--surface);
      border:1px solid var(--line); border-radius:var(--r3); padding:var(--s4) var(--s4); margin-bottom:var(--s3); cursor:pointer;
      text-decoration:none; color:inherit; font:inherit; transition:border-color .15s,box-shadow .15s,transform .1s; }
    .card:hover { border-color:#d6d3d1; box-shadow:var(--shadow); transform:translateY(-1px); }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--accent,#a8a29e); margin-top:6px; flex-shrink:0; }
    .q { font-size:var(--fz-md); font-weight:500; color:var(--ink); }
    .a { display:block; font-size:var(--fz-sm); color:var(--muted); margin-top:var(--s1); line-height:1.5; }
    .count { font-size:var(--fz-sm); color:var(--muted); margin-left:auto; flex-shrink:0; white-space:nowrap; }
    #canvas { position:absolute; inset:0; overflow:hidden; cursor:grab;
      background-image:radial-gradient(var(--line) 1px,transparent 1px); background-size:22px 22px; }
    #canvas.drag { cursor:grabbing; }
    #stage { position:absolute; left:0; top:0; transform-origin:0 0; }
    .node { position:absolute; width:230px; height:84px; overflow:hidden; background:var(--surface);
      border:1px solid var(--line); border-radius:var(--r3); padding:var(--s3) var(--s4); cursor:pointer;
      box-shadow:0 2px 10px rgba(28,25,23,.05); font-size:var(--fz-sm); line-height:1.45; transition:box-shadow .15s,border-color .15s; }
    .node .text { display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; line-clamp:2; overflow:hidden; }
    .node:hover { border-color:#d6d3d1; box-shadow:0 6px 18px rgba(28,25,23,.09); }
    .node.focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft),0 8px 22px rgba(28,25,23,.12); }
    .node .badge { display:inline-flex; align-items:center; gap:5px; font-size:9.5px; font-weight:600;
      text-transform:uppercase; letter-spacing:.05em; color:var(--bt,#78716c); margin-bottom:6px; }
    .node .badge::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
    svg#edges { position:absolute; left:0; top:0; overflow:visible; }
    /* detail drawer: inline editor */
    #detail { position:fixed; top:56px; right:0; bottom:0; width:400px; z-index:40; background:var(--surface);
      border-left:1px solid var(--line); box-shadow:-8px 0 28px rgba(28,25,23,.07); padding:var(--s5); overflow:auto; }
    .d-top { display:flex; align-items:center; gap:var(--s2); margin-bottom:var(--s2); }
    .badge2 { display:inline-flex; align-items:center; gap:6px; font-size:var(--fz-xs); font-weight:600;
      text-transform:uppercase; letter-spacing:.06em; color:var(--bt,var(--muted)); }
    .badge2::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
    .status { margin-left:auto; font-size:var(--fz-xs); color:var(--faint); transition:opacity .2s; }
    .icon { width:28px; height:28px; display:grid; place-items:center; border:none; border-radius:var(--r1);
      background:transparent; color:var(--muted); font-size:18px; line-height:1; cursor:pointer; }
    .icon:hover { background:var(--hover); color:var(--ink); }
    .edit { display:block; width:100%; border:none; background:transparent; resize:none; overflow:hidden; font:inherit;
      color:var(--ink); outline:none; border-radius:var(--r1); padding:var(--s2); margin:0 calc(-1*var(--s2)) var(--s1);
      transition:background .12s,box-shadow .12s; }
    .edit:hover { background:var(--hover); } .edit:focus { background:var(--hover); box-shadow:0 0 0 1px var(--line) inset; }
    .edit::placeholder { color:var(--faint); }
    .edit.title { font-size:var(--fz-xl); font-weight:600; line-height:1.3; letter-spacing:-.01em; }
    .edit.answer { font-size:var(--fz-md); color:var(--ink2); line-height:1.6; min-height:64px; }
    .cite-row { display:flex; align-items:center; gap:6px; margin-top:var(--s2); color:var(--muted); }
    .cite-ic { font-size:13px; }
    .edit.cite { flex:1; font-size:var(--fz-sm); color:var(--accent); margin:0; }
    .edit.cite::placeholder { color:var(--faint); }
    .lbl { font-size:var(--fz-xs); text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
      font-weight:600; margin:var(--s5) 0 var(--s2); }
    .hint { font-size:var(--fz-sm); color:var(--faint); }
    .addlink { margin-top:var(--s2); width:100%; height:var(--ctl); border:1px solid var(--line); border-radius:var(--r2);
      background:var(--bg); color:var(--muted); font:inherit; font-size:var(--fz-sm); padding:0 var(--s2); cursor:pointer; outline:none; }
    .addlink:focus { border-color:var(--accent); }
    .del { display:block; margin-top:var(--s5); background:none; border:none; padding:var(--s1) 0; color:var(--faint);
      font:inherit; font-size:var(--fz-sm); cursor:pointer; }
    .del:hover,.del.armed { color:var(--danger); }
    .err { margin-top:var(--s2); font-size:var(--fz-sm); color:var(--danger); background:var(--danger-soft);
      border:1px solid var(--danger-line); border-radius:var(--r1); padding:var(--s2) var(--s3); }
    .chip { display:inline-flex; align-items:center; font-size:var(--fz-sm); padding:5px 6px 5px 12px; margin:0 6px 6px 0;
      cursor:pointer; border:1px solid var(--line); border-radius:var(--rp); background:var(--bg); color:var(--ink2);
      transition:border-color .12s,color .12s; }
    .chip:hover { border-color:var(--accent); color:var(--accent); }
    .chip b { margin-left:6px; padding:0 4px; color:var(--faint); font-weight:400; border-radius:var(--rp); }
    .chip b:hover { color:var(--danger); }
    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--s2);
      height:70vh; color:var(--muted); text-align:center; }
    .empty h2 { margin:var(--s3) 0 0; font-size:16px; font-weight:600; color:var(--ink); }
    .empty p { margin:0; font-size:var(--fz-sm); max-width:340px; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/" id="home" title="Cairn">
      <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
        <ellipse cx="12" cy="19" rx="8" ry="2.5" fill="#1c1917" />
        <ellipse cx="12" cy="13.6" rx="6.2" ry="2.3" fill="#44403c" />
        <ellipse cx="12" cy="8.6" rx="4.5" ry="2.1" fill="#78716c" />
        <ellipse cx="12" cy="4.4" rx="2.7" ry="1.7" fill="#a8a29e" />
      </svg>
      <span class="brand">Cairn</span>
    </a>
    <span class="crumb" id="crumb"></span>
    <span class="grow"></span>
    <input id="q" placeholder="Search thoughts" autocomplete="off" />
    <div class="toggle" id="toggle" hidden>
      <button data-mode="graph" class="on">Graph</button>
      <button data-mode="list">List</button>
    </div>
    <button id="new" class="newbtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14" /></svg>
      New
    </button>
  </header>
  <main><div id="app"></div></main>
  <aside id="detail" hidden></aside>
  <script type="module" src="/app.js"></script>
</body>
</html>
