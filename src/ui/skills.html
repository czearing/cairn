<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cairn Skills</title>
<style>
  :root { color-scheme: light dark; --c-cyan:#2a9fd6; --c-green:#2e9b57; --c-amber:#c98a16; --c-red:#cc4444; --bd: color-mix(in srgb, currentColor 14%, transparent); }
  @media (prefers-color-scheme: dark) { :root { --c-cyan:#5cc4ef; --c-green:#52c47e; --c-amber:#e0a93a; --c-red:#e06b6b; } }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 20px 22px 56px; max-width: 1180px; margin-inline: auto; }
  h1 { font-size: 18px; margin: 0; }
  .hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .search { font: 13px ui-sans-serif, system-ui, sans-serif; padding: 8px 12px; border-radius: 9px; border: 1px solid color-mix(in srgb, currentColor 20%, transparent); background: color-mix(in srgb, currentColor 4%, transparent); color: inherit; width: 260px; max-width: 100%; }
  @media (max-width: 700px) { .search { width: 100%; } }
  .search:focus { outline: none; border-color: color-mix(in srgb, var(--c-cyan) 60%, transparent); }
  .muted { opacity: .5; font-size: 12px; }
  .empty { opacity: .5; font-size: 13px; padding: 18px 2px; }

  .layout { display: grid; grid-template-columns: 252px minmax(0, 1fr); gap: 22px; align-items: start; }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } .side { position: static; } }
  .side { position: sticky; top: 14px; min-width: 0; }
  main { min-width: 0; }
  .skhead { min-width: 0; }
  @media (max-width: 480px) { .skspark { display: none; } }

  summary { list-style: none; cursor: pointer; }
  summary::-webkit-details-marker { display: none; }
  .chip { font-variant-numeric: tabular-nums; font-weight: 650; font-size: 12px; padding: 2px 8px; border-radius: 20px; background: color-mix(in srgb, currentColor 13%, transparent); flex: none; }
  .chip.hi { color: var(--c-green); background: color-mix(in srgb, var(--c-green) 15%, transparent); }
  .chip.mid { color: var(--c-amber); background: color-mix(in srgb, var(--c-amber) 16%, transparent); }
  .chip.lo { color: var(--c-red); background: color-mix(in srgb, var(--c-red) 15%, transparent); }
  .caret::before { content: "▸"; opacity: .4; font-size: 11px; flex: none; }
  details[open] > summary .caret::before, details[open] > summary.caret::before { content: "▾"; }

  /* LEFT: recent activity, collapsed by default, expands on click */
  .actpanel { border: 1px solid var(--bd); border-radius: 11px; }
  .actsum { display: flex; align-items: center; gap: 8px; padding: 11px 13px; font-size: 13px; font-weight: 600; }
  .actsum .cnt { opacity: .5; font-weight: 400; font-variant-numeric: tabular-nums; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--c-cyan); animation: pulse 1.2s ease-in-out infinite; margin-left: auto; flex: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .2; } }
  .actbody { padding: 2px 11px 10px; max-height: calc(100vh - 130px); overflow: auto; }
  .now { font-size: 12.5px; opacity: .7; border-bottom: 1px solid var(--bd); padding-bottom: 8px; margin-bottom: 6px; }
  .now .nowq { display: block; max-height: 3em; overflow: auto; opacity: .8; margin-top: 2px; }
  .ev { border-top: 1px solid color-mix(in srgb, currentColor 8%, transparent); padding: 7px 0; font-size: 12.5px; }
  .ev:first-child { border-top: none; }
  .evtop { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .evtime { opacity: .45; font-size: 11px; font-variant-numeric: tabular-nums; }
  .evlabel { font-weight: 600; cursor: pointer; }
  .evlabel:hover { text-decoration: underline; }
  .tag { font-size: 10px; padding: 0 6px; border-radius: 20px; border: 1px solid color-mix(in srgb, currentColor 20%, transparent); opacity: .7; }
  .tag.new { color: var(--c-green); } .tag.gone { color: var(--c-amber); }
  details.ev > summary.evtop::before { content: "▸"; opacity: .35; font-size: 10px; }
  details.ev[open] > summary.evtop::before { content: "▾"; }
  .lo { color: var(--c-red); }

  /* CENTER: skills, each a collapsible accordion (click row to open, click again to close) */
  .skill { border: 1px solid var(--bd); border-radius: 11px; margin-bottom: 8px; background: color-mix(in srgb, currentColor 2%, transparent); }
  .skill[open] { background: color-mix(in srgb, currentColor 4%, transparent); border-color: color-mix(in srgb, currentColor 22%, transparent); }
  .skhead { display: flex; align-items: center; gap: 11px; padding: 11px 14px; }
  .skname { font-weight: 650; font-size: 15px; }
  .sksub { opacity: .45; font-size: 12px; }
  .skspark { margin-left: auto; opacity: .6; display: flex; }
  .skbody { padding: 4px 16px 16px; }
  .dbar { display: flex; align-items: center; gap: 10px; margin: 2px 0 4px; }
  .del { margin-left: auto; font: 12px ui-sans-serif, system-ui, sans-serif; color: var(--c-red); background: none; border: 1px solid color-mix(in srgb, var(--c-red) 35%, transparent); border-radius: 7px; padding: 4px 11px; cursor: pointer; }
  .del:hover { background: color-mix(in srgb, var(--c-red) 12%, transparent); }
  .sect { text-transform: uppercase; letter-spacing: .05em; font-size: 10.5px; opacity: .42; font-weight: 700; margin: 16px 0 7px; }
  .why { font-size: 13px; line-height: 1.6; opacity: .85; }

  .run { padding: 9px 0; border-top: 1px solid color-mix(in srgb, currentColor 9%, transparent); }
  .run:first-child { border-top: none; }
  .runtop { display: flex; align-items: center; gap: 9px; }
  .ln { font-size: 13px; line-height: 1.55; padding: 1px 0 1px 18px; text-indent: -18px; margin-top: 4px; }
  .ln.ok { color: var(--c-green); } .ln.bad { color: var(--c-red); } .ln.next { color: var(--c-cyan); }

  details.more { margin-top: 14px; }
  details.more > summary { font-size: 11.5px; opacity: .65; display: flex; align-items: center; gap: 5px; }
  details.more > summary:hover { opacity: .95; }
  pre { white-space: pre-wrap; word-break: break-word; background: color-mix(in srgb, currentColor 6%, transparent); padding: 12px; border-radius: 8px; font: 12px/1.55 ui-monospace, monospace; margin: 8px 0 0; }
  .diff { font: 12px/1.55 ui-monospace, monospace; background: color-mix(in srgb, currentColor 5%, transparent); padding: 9px 11px; border-radius: 8px; margin: 8px 0 0; white-space: pre-wrap; word-break: break-word; }
  .dl { padding: 1px 5px; border-radius: 3px; }
  .dl.add { color: var(--c-green); background: color-mix(in srgb, var(--c-green) 13%, transparent); }
  .dl.del { color: var(--c-red); background: color-mix(in srgb, var(--c-red) 12%, transparent); }
  .dl.ctx { opacity: .5; }
  .version { border-left: 2px solid color-mix(in srgb, currentColor 13%, transparent); padding-left: 13px; margin: 14px 0; }
  .vhead { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
</style>
</head>
<body>
<div class="hdr">
  <h1>Cairn Skills</h1>
  <input id="q" class="search" type="search" placeholder="search skills by meaning&hellip;" autocomplete="off" />
</div>
<div class="layout">
  <aside class="side"><details class="actpanel" id="actpanel" data-k="actpanel"><summary class="actsum"><span class="caret"></span>Recent activity <span class="cnt" id="actcount"></span><span id="actpulse"></span></summary><div class="actbody" id="feed"></div></details></aside>
  <main id="skills"></main>
</div>
<script>
const esc = (s) => (s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const fmtTs = (t) => t > 1e10 ? new Date(t).toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "#" + t;
const tier = (s) => s >= 0.7 ? "hi" : s >= 0.5 ? "mid" : "lo";
const rev = (r) => { try { return JSON.parse(r) || {}; } catch { return {}; } };
const lastTs = (s) => s.runs && s.runs.length ? Math.max(...s.runs.map((r) => r.ts)) : (s.ts || 0);

function sparkline(scores, w0, h0) {
  if (scores.length < 2) return "";
  const w = w0 || Math.max(40, Math.min(84, scores.length * 12)), h = h0 || 18, pad = 2.5;
  const x = (i) => pad + i * (w - 2 * pad) / (scores.length - 1);
  const y = (v) => h - pad - Math.max(0, Math.min(1, v)) * (h - 2 * pad);
  const pts = scores.map((v, i) => x(i) + "," + y(v).toFixed(1)).join(" ");
  const dots = scores.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="1.7" fill="currentColor"/>`).join("");
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".55"/>${dots}</svg>`;
}
const reviewLines = (v) => [
  v.right ? `<div class="ln ok">✓ ${esc(v.right)}</div>` : "",
  v.wrong ? `<div class="ln bad">✗ ${esc(v.wrong)}</div>` : "",
  v.improve ? `<div class="ln next">→ ${esc(v.improve)}</div>` : "",
].join("");

// LCS line diff between two master-prompt versions: added (+) green, removed (-) red, unchanged context muted.
function diffLines(oldT, newT) {
  const a = (oldT || "").split("\n"), b = (newT || "").split("\n"), m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = m - 1; i >= 0; i--) for (let j = n - 1; j >= 0; j--) dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  const out = []; let i = 0, j = 0;
  while (i < m && j < n) { if (a[i] === b[j]) { out.push([" ", a[i]]); i++; j++; } else if (dp[i + 1][j] >= dp[i][j + 1]) { out.push(["-", a[i]]); i++; } else { out.push(["+", b[j]]); j++; } }
  while (i < m) out.push(["-", a[i++]]); while (j < n) out.push(["+", b[j++]]);
  return out;
}
function renderDiff(oldT, newT) {
  const d = diffLines(oldT, newT);
  if (!d.some(([t]) => t !== " ")) return `<div class="diff"><div class="dl ctx">(no textual change)</div></div>`;
  return `<div class="diff">${d.map(([t, line]) => `<div class="dl ${t === "+" ? "add" : t === "-" ? "del" : "ctx"}">${t} ${esc(line)}</div>`).join("")}</div>`;
}

let SKILLS = [], ACTIVITY = [], FILTERED = null, q = "", FORCE = [], applied = false;
const openSet = () => new Set([...[...document.querySelectorAll("details[open]")].map((d) => d.dataset.k).filter(Boolean), ...FORCE]);
// Deep-link / screenshot aid: /skills?open=<skill name> expands that skill (and its history); ?act opens activity.
function applyUrl() {
  if (applied) return; applied = true;
  const p = new URLSearchParams(location.search), on = p.get("open");
  if (p.has("act")) FORCE.push("actpanel");
  if (on) { const s = SKILLS.find((x) => x.task === on); if (s) { FORCE.push("skill:" + s.id, s.id + ":master", s.id + ":hist"); (s.versions || []).forEach((_, i) => FORCE.push(s.id + ":d" + (i + 1))); } }
}

function skillCard(s, o) {
  const scores = s.runs.map((r) => r.quality), last = scores.length ? scores[scores.length - 1] : null;
  const k = "skill:" + s.id, vs = s.versions || [];
  const runs = s.runs.slice().reverse().map((r) => {
    const lines = reviewLines(rev(r.review));
    return `<div class="run"><div class="runtop"><span class="chip ${tier(r.quality)}">${r.quality.toFixed(2)}</span><span class="muted">${fmtTs(r.ts)}</span></div>${lines || ""}</div>`;
  }).join("");
  // Latest change shown DIRECTLY (not buried): diff of the two most recent master versions.
  const latest = vs.length >= 2
    ? `<div class="sect">what changed &middot; v${vs.length - 1} &rarr; v${vs.length}</div>${renderDiff(vs[vs.length - 2].master, vs[vs.length - 1].master)}`
    : `<div class="sect">version history</div><div class="muted">v1 &middot; initial master, no earlier version to diff yet</div>`;
  const history = vs.length >= 3 ? `<details class="more" data-k="${esc(s.id)}:hist"${o.has(s.id + ":hist") ? " open" : ""}><summary><span class="caret"></span>full history &middot; ${vs.length} versions</summary>${
    vs.map((v, i) => ({ ...v, n: i + 1 })).reverse().map((v) => {
      const prev = vs[v.n - 2];
      return `<div class="version"><div class="vhead"><span class="chip ${tier(v.score || 0)}">${(v.score || 0).toFixed(2)}</span><b>v${v.n}</b><span class="muted">${fmtTs(v.ts)}</span></div>${v.explanation ? `<div class="why" style="margin-top:5px">${esc(v.explanation)}</div>` : ""}${prev ? `<details class="more" data-k="${esc(s.id)}:d${v.n}"${o.has(s.id + ":d" + v.n) ? " open" : ""}><summary><span class="caret"></span>diff v${v.n - 1} &rarr; v${v.n}</summary>${renderDiff(prev.master, v.master)}</details>` : ""}</div>`;
    }).join("")}</details>` : "";
  return `<details class="skill" data-k="${k}"${o.has(k) ? " open" : ""}>
    <summary class="skhead"><span class="caret"></span><span class="chip ${last != null ? tier(last) : ""}">${last != null ? last.toFixed(2) : "—"}</span><span class="skname">${esc(s.task)}</span><span class="sksub">${s.runs.length} run${s.runs.length === 1 ? "" : "s"}</span><span class="skspark">${sparkline(scores)}</span></summary>
    <div class="skbody">
      <div class="dbar"><button class="del" data-del="${esc(s.id)}" data-name="${esc(s.task)}">delete skill</button></div>
      ${s.explanation ? `<div class="sect">why this works</div><div class="why">${esc(s.explanation)}</div>` : ""}
      ${latest}
      ${s.runs.length ? `<div class="sect">runs &middot; what worked / what didn't</div>${runs}` : ""}
      ${s.masterPrompt ? `<details class="more" data-k="${esc(s.id)}:master"${o.has(s.id + ":master") ? " open" : ""}><summary><span class="caret"></span>current master prompt</summary><pre>${esc(s.masterPrompt)}</pre></details>` : ""}
      ${history}
    </div>
  </details>`;
}

function feedHtml(o) {
  const live = new Set(SKILLS.map((s) => s.task));
  const running = ACTIVITY.filter((e) => e.phase === "start" && !ACTIVITY.some((x) => x.phase !== "start" && x.ts === e.ts));
  const banner = running.length ? `<div class="now">reviewing<span class="nowq">${esc(running[0].request || "")}</span></div>` : "";
  const done = ACTIVITY.filter((e) => e.phase !== "start");
  const evs = done.map((e) => {
    if (e.phase === "failed") return `<div class="ev"><div class="evtop"><span class="evtime">${fmtTs(e.ts)}</span><span class="lo">learner failed</span></div></div>`;
    if (e.phase === "skipped") return `<div class="ev"><div class="evtop"><span class="evtime">${fmtTs(e.ts)}</span><span class="muted">not a task</span></div></div>`;
    const s = e.score ?? 0, r = e.review || {}, gone = e.label && !live.has(e.label), k = "ev:" + e.ts + ":" + (e.label || "");
    const tags = `${e.created ? `<span class="tag new">new</span>` : `<span class="tag">upd</span>`}${gone ? `<span class="tag gone">gone</span>` : ""}`;
    const head = `<span class="evtime">${fmtTs(e.ts)}</span><span class="chip ${tier(s)}">${s.toFixed(2)}</span><span class="evlabel" ${gone ? "" : `data-sel-label="${esc(e.label || "")}"`}>${esc(e.label || "?")}</span>${tags}`;
    const detail = `${e.output ? `<div class="ln" style="opacity:.7;text-indent:0;padding-left:0;margin-top:5px">${esc(e.output)}</div>` : ""}${reviewLines({ right: r.right, wrong: r.wrong, improve: r.improve })}`;
    if (!detail.trim()) return `<div class="ev"><div class="evtop">${head}</div></div>`;
    return `<details class="ev" data-k="${esc(k)}"${o.has(k) ? " open" : ""}><summary class="evtop">${head}</summary><div style="padding:5px 0 4px">${detail}</div></details>`;
  }).join("");
  return banner + (evs || '<div class="empty">Nothing learned yet.</div>');
}

let lastJson = "";
async function load() {
  try {
    [SKILLS, ACTIVITY] = await Promise.all([
      (await fetch("/api/skills")).json().then((d) => d.skills || []),
      (await fetch("/api/activity")).json().then((d) => d.activity || []),
    ]);
    FILTERED = q ? await (await fetch("/api/skills?q=" + encodeURIComponent(q))).json().then((d) => d.skills || []) : null;
  } catch { return; }
  applyUrl();
  const json = JSON.stringify({ q, SKILLS, ACTIVITY, FILTERED });
  if (json === lastJson) return; // skip rebuild so an open accordion / scroll never resets
  lastJson = json;
  const o = openSet();
  const list = FILTERED !== null ? FILTERED : SKILLS.slice().sort((a, b) => lastTs(b) - lastTs(a));
  document.getElementById("skills").innerHTML = list.length ? list.map((s) => skillCard(s, o)).join("") : `<div class="empty">${q ? "No skills match that search." : "No skills yet. They appear after the agent finishes a task."}</div>`;
  const done = ACTIVITY.filter((e) => e.phase !== "start");
  document.getElementById("actcount").textContent = done.length;
  const running = ACTIVITY.some((e) => e.phase === "start" && !ACTIVITY.some((x) => x.phase !== "start" && x.ts === e.ts));
  document.getElementById("actpulse").outerHTML = `<span id="actpulse"${running ? ' class="pulse"' : ""}></span>`;
  document.getElementById("feed").innerHTML = feedHtml(o);
  if (FORCE.includes("actpanel")) document.getElementById("actpanel").open = true; // deep-link / screenshot
}
load();
setInterval(load, 2000);

document.addEventListener("click", async (e) => {
  const lbl = e.target.closest("[data-sel-label]");
  if (lbl) { const s = SKILLS.find((x) => x.task === lbl.dataset.selLabel); if (s) { const d = document.querySelector(`details.skill[data-k="skill:${CSS.escape(s.id)}"]`); if (d) { d.open = true; d.scrollIntoView({ behavior: "smooth", block: "start" }); } } return; }
  const del = e.target.closest("[data-del]");
  if (del) {
    e.preventDefault();
    if (!confirm(`Delete skill "${del.dataset.name}"?\nThis permanently removes its master prompt, all runs, and version history.`)) return;
    await fetch("/api/skills/" + encodeURIComponent(del.dataset.del), { method: "DELETE" });
    lastJson = ""; load();
  }
});
{ let deb; document.getElementById("q").addEventListener("input", (e) => { q = e.target.value.trim(); clearTimeout(deb); deb = setTimeout(() => { lastJson = ""; load(); }, 220); }); }
</script>
</body>
</html>
