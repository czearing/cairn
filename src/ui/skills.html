<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cairn Skills</title>
<style>
  :root { color-scheme: light dark; --c-cyan:#5cc4ef; --c-green:#52c47e; --c-amber:#e0a93a; --c-red:#e06b6b; --bg:#16181c; --fg:#e6e8ea; --bd: color-mix(in srgb, var(--fg) 14%, transparent); --bd2: color-mix(in srgb, var(--fg) 9%, transparent); }
  * { box-sizing: border-box; }
  body { font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--fg); padding: 22px 22px 60px; max-width: 880px; margin-inline: auto; }
  h1 { font-size: 18px; margin: 0; font-weight: 700; }
  .hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .search { font: 13px ui-sans-serif, system-ui, sans-serif; padding: 8px 12px; border-radius: 9px; border: 1px solid var(--bd); background: color-mix(in srgb, var(--fg) 4%, transparent); color: inherit; width: 220px; max-width: 100%; }
  .search:focus { outline: none; border-color: color-mix(in srgb, var(--c-cyan) 60%, transparent); }
  @media (max-width: 600px) { .search { width: 100%; } }
  .muted { opacity: .55; }
  .empty { opacity: .55; font-size: 13px; padding: 28px 4px; text-align: center; }

  /* one filter control = one component for skills + activity */
  .tabs { display: flex; gap: 4px; background: color-mix(in srgb, var(--fg) 6%, transparent); border-radius: 10px; padding: 4px; width: fit-content; margin-bottom: 14px; }
  .tab { font: 13px ui-sans-serif, system-ui, sans-serif; color: var(--fg); opacity: .6; background: none; border: 0; padding: 6px 14px; border-radius: 7px; cursor: pointer; }
  .tab.on { opacity: 1; background: color-mix(in srgb, var(--fg) 9%, transparent); font-weight: 600; }
  .tab .n { opacity: .5; font-variant-numeric: tabular-nums; margin-left: 5px; }
  .live { width: 7px; height: 7px; border-radius: 50%; background: var(--c-cyan); display: inline-block; margin-left: 6px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .2; } }

  /* one ROW component, shared by both tabs */
  .list { border: 1px solid var(--bd); border-radius: 12px; overflow: hidden; }
  .row { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-top: 1px solid var(--bd2); cursor: pointer; }
  .row:first-child { border-top: none; }
  .row:hover { background: color-mix(in srgb, var(--fg) 4%, transparent); }
  .chip { font-variant-numeric: tabular-nums; font-weight: 650; font-size: 12px; padding: 3px 9px; border-radius: 20px; background: color-mix(in srgb, var(--fg) 12%, transparent); flex: none; min-width: 44px; text-align: center; }
  .chip.hi { color: var(--c-green); background: color-mix(in srgb, var(--c-green) 16%, transparent); }
  .chip.mid { color: var(--c-amber); background: color-mix(in srgb, var(--c-amber) 18%, transparent); }
  .chip.lo { color: var(--c-red); background: color-mix(in srgb, var(--c-red) 16%, transparent); }
  .name { font-weight: 600; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub { opacity: .5; font-size: 12.5px; flex: none; }
  .right { margin-left: auto; display: flex; align-items: center; gap: 12px; flex: none; }
  .spark { opacity: .55; display: flex; }
  .when { opacity: .5; font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .tag { font-size: 11px; padding: 1px 8px; border-radius: 20px; border: 1px solid var(--bd); opacity: .8; flex: none; }
  .tag.new { color: var(--c-green); border-color: color-mix(in srgb, var(--c-green) 45%, transparent); }
  .tag.gone { color: var(--c-amber); border-color: color-mix(in srgb, var(--c-amber) 45%, transparent); }
  .chev { opacity: .3; flex: none; }
  .row.flat { cursor: default; }
  .row.flat:hover { background: none; }

  /* modal popup for skill detail */
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 10; overflow: auto; }
  .modal { background: var(--bg); border: 1px solid var(--bd); border-radius: 14px; width: 100%; max-width: 700px; box-shadow: 0 16px 50px rgba(0,0,0,.5); }
  .mhead { display: flex; align-items: center; gap: 12px; padding: 18px 20px 12px; border-bottom: 1px solid var(--bd2); position: sticky; top: 0; background: var(--bg); border-radius: 14px 14px 0 0; }
  .mtitle { font-weight: 700; font-size: 17px; }
  .mclose { margin-left: auto; background: none; border: 0; color: var(--fg); opacity: .5; font-size: 22px; line-height: 1; cursor: pointer; padding: 0 4px; }
  .mclose:hover { opacity: 1; }
  .del { font: 12px ui-sans-serif, system-ui, sans-serif; color: var(--c-red); background: none; border: 1px solid color-mix(in srgb, var(--c-red) 38%, transparent); border-radius: 7px; padding: 4px 11px; cursor: pointer; }
  .del:hover { background: color-mix(in srgb, var(--c-red) 13%, transparent); }
  .mbody { padding: 14px 20px 22px; }
  .sect { text-transform: uppercase; letter-spacing: .05em; font-size: 10.5px; opacity: .45; font-weight: 700; margin: 18px 0 7px; }
  .sect:first-child { margin-top: 4px; }
  .why { font-size: 13.5px; line-height: 1.6; opacity: .9; }

  .run { padding: 10px 0; border-top: 1px solid var(--bd2); }
  .run:first-child { border-top: none; }
  .runtop { display: flex; align-items: center; gap: 9px; }
  .ln { font-size: 13.5px; line-height: 1.55; padding: 2px 0 2px 19px; text-indent: -19px; }
  .ln.ok { color: var(--c-green); } .ln.bad { color: var(--c-red); } .ln.next { color: var(--c-cyan); }

  details.more { margin-top: 14px; }
  details.more > summary { font-size: 12px; opacity: .65; cursor: pointer; list-style: none; }
  details.more > summary::-webkit-details-marker { display: none; }
  details.more > summary::before { content: "▸ "; opacity: .6; }
  details.more[open] > summary::before { content: "▾ "; }
  pre { white-space: pre-wrap; word-break: break-word; background: color-mix(in srgb, var(--fg) 6%, transparent); padding: 12px; border-radius: 8px; font: 12px/1.55 ui-monospace, monospace; margin: 8px 0 0; }
  .diff { font: 12px/1.6 ui-monospace, monospace; background: color-mix(in srgb, var(--fg) 5%, transparent); padding: 10px 12px; border-radius: 8px; margin: 8px 0 0; }
  .dl { padding: 1px 5px; border-radius: 3px; white-space: pre-wrap; word-break: break-word; }
  .dl.add { color: var(--c-green); background: color-mix(in srgb, var(--c-green) 14%, transparent); }
  .dl.del { color: var(--c-red); background: color-mix(in srgb, var(--c-red) 13%, transparent); }
  .dl.ctx { opacity: .5; }
  .version { border-left: 2px solid var(--bd); padding-left: 13px; margin: 14px 0; }
  .vhead { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .now { font-size: 12.5px; opacity: .75; margin-bottom: 12px; display: flex; gap: 8px; }
  .now .nowq { display: block; max-height: 3em; overflow: auto; opacity: .8; }
</style>
</head>
<body>
<div class="hdr">
  <h1>Cairn Skills</h1>
  <input id="q" class="search" type="search" placeholder="Search" autocomplete="off" />
</div>
<div class="tabs" id="tabs"></div>
<div id="list"></div>
<div id="modal"></div>
<script>
const esc = (s) => (s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const tier = (s) => s >= 0.7 ? "hi" : s >= 0.5 ? "mid" : "lo";
const rev = (r) => { try { return JSON.parse(r) || {}; } catch { return {}; } };
const lastTs = (s) => s.runs && s.runs.length ? Math.max(...s.runs.map((r) => r.ts)) : (s.ts || 0);
function rel(t) { // compact relative time; full ts on hover
  const d = (Date.now() - t) / 1000;
  if (d < 60) return "now"; if (d < 3600) return Math.floor(d / 60) + "m"; if (d < 86400) return Math.floor(d / 3600) + "h";
  if (d < 604800) return Math.floor(d / 86400) + "d"; return new Date(t).toLocaleDateString([], { month: "short", day: "numeric" });
}
const fullTs = (t) => new Date(t).toLocaleString();
function sparkline(scores) {
  if (scores.length < 2) return "";
  const w = Math.max(36, Math.min(70, scores.length * 10)), h = 16, pad = 2.5;
  const x = (i) => pad + i * (w - 2 * pad) / (scores.length - 1), y = (v) => h - pad - Math.max(0, Math.min(1, v)) * (h - 2 * pad);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${scores.map((v, i) => x(i) + "," + y(v).toFixed(1)).join(" ")}" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".6"/>${scores.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="1.6" fill="currentColor"/>`).join("")}</svg>`;
}
const reviewLines = (v) => [
  v.right ? `<div class="ln ok">✓ ${esc(v.right)}</div>` : "",
  v.wrong ? `<div class="ln bad">✗ ${esc(v.wrong)}</div>` : "",
  v.improve ? `<div class="ln next">→ ${esc(v.improve)}</div>` : "",
].join("");
function diffLines(a0, b0) {
  const a = (a0 || "").split("\n"), b = (b0 || "").split("\n"), m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = m - 1; i >= 0; i--) for (let j = n - 1; j >= 0; j--) dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  const o = []; let i = 0, j = 0;
  while (i < m && j < n) { if (a[i] === b[j]) { o.push([" ", a[i]]); i++; j++; } else if (dp[i + 1][j] >= dp[i][j + 1]) { o.push(["-", a[i]]); i++; } else { o.push(["+", b[j]]); j++; } }
  while (i < m) o.push(["-", a[i++]]); while (j < n) o.push(["+", b[j++]]); return o;
}
function renderDiff(a, b) {
  const d = diffLines(a, b);
  if (!d.some(([t]) => t !== " ")) return `<div class="diff"><div class="dl ctx">(no textual change)</div></div>`;
  return `<div class="diff">${d.map(([t, l]) => `<div class="dl ${t === "+" ? "add" : t === "-" ? "del" : "ctx"}">${t} ${esc(l)}</div>`).join("")}</div>`;
}

let SKILLS = [], ACTIVITY = [], FILTERED = null, q = "", tab = "skills", modalId = null, urlApplied = false;
// Deep-link / screenshot aid: ?tab=activity opens that tab; ?skill=<name> opens that skill's modal.
function applyUrl() {
  if (urlApplied || !SKILLS.length) return; urlApplied = true;
  const p = new URLSearchParams(location.search);
  if (p.get("tab") === "activity") tab = "activity";
  const sn = p.get("skill"); if (sn) { const s = skillByLabel(sn); if (s) modalId = s.id; }
}
const skillBy = (id) => SKILLS.find((s) => s.id === id);
const skillByLabel = (l) => SKILLS.find((s) => s.task === l);
const isRunning = () => ACTIVITY.some((e) => e.phase === "start" && !ACTIVITY.some((x) => x.phase !== "start" && x.ts === e.ts));

function skillRow(s) {
  const scores = s.runs.map((r) => r.quality), last = scores.length ? scores[scores.length - 1] : null;
  return `<div class="row" data-skill="${esc(s.id)}"><span class="chip ${last != null ? tier(last) : ""}">${last != null ? last.toFixed(2) : "—"}</span><span class="name">${esc(s.task)}</span><span class="right"><span class="sub">${s.runs.length} run${s.runs.length === 1 ? "" : "s"}</span><span class="spark">${sparkline(scores)}</span><span class="chev">›</span></span></div>`;
}
function activityRow(e) {
  if (e.phase === "failed") return `<div class="row flat"><span class="chip lo">fail</span><span class="name" style="color:var(--c-red);opacity:.85">learner call failed</span><span class="right"><span class="when" title="${fullTs(e.ts)}">${rel(e.ts)}</span></span></div>`;
  if (e.phase === "skipped") return `<div class="row flat"><span class="chip">—</span><span class="name muted">not a reusable task</span><span class="right"><span class="when" title="${fullTs(e.ts)}">${rel(e.ts)}</span></span></div>`;
  const s = e.score ?? 0, exists = e.label && skillByLabel(e.label);
  const tag = `${e.created ? `<span class="tag new">new</span>` : `<span class="tag">updated</span>`}${e.label && !exists ? `<span class="tag gone">removed</span>` : ""}`;
  return `<div class="row${exists ? "" : " flat"}" ${exists ? `data-label="${esc(e.label)}"` : ""}><span class="chip ${tier(s)}">${s.toFixed(2)}</span><span class="name">${esc(e.label || "?")}</span>${tag}<span class="right"><span class="when" title="${fullTs(e.ts)}">${rel(e.ts)}</span>${exists ? '<span class="chev">›</span>' : ""}</span></div>`;
}

let listKey = "";
function renderTabs() {
  const done = ACTIVITY.filter((e) => e.phase !== "start").length;
  document.getElementById("tabs").innerHTML =
    `<button class="tab ${tab === "skills" ? "on" : ""}" data-tab="skills">Skills <span class="n">${SKILLS.length}</span></button>` +
    `<button class="tab ${tab === "activity" ? "on" : ""}" data-tab="activity">Activity <span class="n">${done}</span>${isRunning() ? '<span class="live" title="reviewing now"></span>' : ""}</button>`;
}
function renderList() {
  let rows;
  if (tab === "skills") {
    const list = FILTERED !== null ? FILTERED : SKILLS.slice().sort((a, b) => lastTs(b) - lastTs(a));
    rows = list.length ? list.map(skillRow).join("") : `<div class="empty">${q ? "No skills match that search." : "No skills yet."}</div>`;
  } else {
    const done = ACTIVITY.filter((e) => e.phase !== "start");
    rows = done.length ? done.map(activityRow).join("") : '<div class="empty">No activity yet.</div>';
  }
  const key = JSON.stringify({ tab, q, rows: rows.length, ids: (tab === "skills" ? (FILTERED || SKILLS) : ACTIVITY).map((x) => x.id || x.ts + x.label) });
  if (key === listKey) return; // dedup: no jitter when the visible tab's data is unchanged
  listKey = key;
  document.getElementById("list").innerHTML = rows.startsWith('<div class="empty"') ? rows : `<div class="list">${rows}</div>`;
}

let modalKey = "";
function renderModal() {
  const el = document.getElementById("modal");
  if (!modalId) { if (modalKey !== "") { modalKey = ""; el.innerHTML = ""; } return; }
  const s = skillBy(modalId);
  if (!s) { modalId = null; el.innerHTML = ""; modalKey = ""; return; }
  const key = JSON.stringify({ id: s.id, runs: s.runs.length, m: (s.masterPrompt || "").length, v: (s.versions || []).length });
  if (key === modalKey) return;
  modalKey = key;
  const scores = s.runs.map((r) => r.quality), last = scores.length ? scores[scores.length - 1] : null, vs = s.versions || [];
  const runs = s.runs.slice().reverse().map((r) => `<div class="run"><div class="runtop"><span class="chip ${tier(r.quality)}">${r.quality.toFixed(2)}</span><span class="when" title="${fullTs(r.ts)}">${rel(r.ts)}</span></div>${reviewLines(rev(r.review))}</div>`).join("");
  const latest = vs.length >= 2 ? `<div class="sect">what changed &middot; v${vs.length - 1} &rarr; v${vs.length}</div>${renderDiff(vs[vs.length - 2].master, vs[vs.length - 1].master)}`
    : `<div class="sect">version history</div><div class="muted" style="font-size:13px">v1 &middot; initial master, no earlier version to diff yet</div>`;
  const history = vs.length >= 3 ? `<details class="more"><summary>full history &middot; ${vs.length} versions</summary>${vs.map((v, i) => ({ ...v, n: i + 1 })).reverse().map((v) => `<div class="version"><div class="vhead"><span class="chip ${tier(v.score || 0)}">${(v.score || 0).toFixed(2)}</span><b>v${v.n}</b><span class="when">${rel(v.ts)}</span></div>${v.explanation ? `<div class="why" style="margin-top:5px">${esc(v.explanation)}</div>` : ""}${vs[v.n - 2] ? `<details class="more"><summary>diff v${v.n - 1} &rarr; v${v.n}</summary>${renderDiff(vs[v.n - 2].master, v.master)}</details>` : ""}</div>`).join("")}</details>` : "";
  el.innerHTML = `<div class="backdrop" data-close="1"><div class="modal" role="dialog" aria-modal="true">
    <div class="mhead"><span class="chip ${last != null ? tier(last) : ""}">${last != null ? last.toFixed(2) : "—"}</span><span class="mtitle">${esc(s.task)}</span><span class="sub">${s.runs.length} run${s.runs.length === 1 ? "" : "s"}</span><button class="mclose" data-close="1" aria-label="close">×</button></div>
    <div class="mbody">
      <div style="display:flex"><button class="del" data-del="${esc(s.id)}" data-name="${esc(s.task)}">delete skill</button></div>
      ${s.explanation ? `<div class="sect">why this works</div><div class="why">${esc(s.explanation)}</div>` : ""}
      ${latest}
      ${s.runs.length ? `<div class="sect">runs &middot; what worked / what didn't</div>${runs}` : ""}
      ${s.masterPrompt ? `<details class="more"><summary>current master prompt</summary><pre>${esc(s.masterPrompt)}</pre></details>` : ""}
      ${history}
    </div></div></div>`;
}

async function load() {
  try {
    [SKILLS, ACTIVITY] = await Promise.all([
      (await fetch("/api/skills")).json().then((d) => d.skills || []),
      (await fetch("/api/activity")).json().then((d) => d.activity || []),
    ]);
    FILTERED = q ? await (await fetch("/api/skills?q=" + encodeURIComponent(q))).json().then((d) => d.skills || []) : null;
  } catch { return; }
  applyUrl();
  renderTabs(); renderList(); renderModal(); // each dedups internally, so unchanged sections never re-render (no jitter)
}
load();
setInterval(load, 2000);

function openSkill(id) { modalId = id; renderModal(); }
function closeModal() { modalId = null; renderModal(); }
document.addEventListener("click", async (e) => {
  const t = e.target.closest("[data-tab]"); if (t) { tab = t.dataset.tab; listKey = ""; renderTabs(); renderList(); return; }
  if (e.target.closest("[data-close]")) { closeModal(); return; }
  const del = e.target.closest("[data-del]"); if (del) {
    e.preventDefault();
    if (!confirm(`Delete skill "${del.dataset.name}"?\nThis removes its master prompt, all runs, and version history.`)) return;
    await fetch("/api/skills/" + encodeURIComponent(del.dataset.del), { method: "DELETE" });
    closeModal(); listKey = ""; load(); return;
  }
  const sk = e.target.closest("[data-skill]"); if (sk) { openSkill(sk.dataset.skill); return; }
  const lb = e.target.closest("[data-label]"); if (lb) { const s = skillByLabel(lb.dataset.label); if (s) openSkill(s.id); return; }
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
{ let deb; document.getElementById("q").addEventListener("input", (e) => { q = e.target.value.trim(); clearTimeout(deb); deb = setTimeout(() => { listKey = ""; load(); }, 200); }); }
</script>
</body>
</html>
